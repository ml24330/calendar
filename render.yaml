# Render Blueprint. Push this with the repo, then in Render:
#   New → Blueprint → pick the repo.
#
# The disk is the part that matters. Without it, Render gives every deploy a
# fresh filesystem and calendar.db disappears along with every event.
services:
  - type: web
    name: org-calendar
    runtime: node
    plan: free               # no disk needed: the database is hosted on Turso
    region: oregon
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.20.0
      - key: TZ
        # The app pins display to CALENDAR_TZ in src/lib/tz.js regardless, but
        # matching the host clock keeps log timestamps readable.
        value: America/Los_Angeles
      - key: ADMIN_PASSPHRASE
        sync: false          # set these by hand in the dashboard; never commit them
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
